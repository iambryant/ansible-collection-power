---
- name: "Ensure facts are gathered from netboot server"
  ansible.builtin.setup:
  delegate_to: "{{ groups['netboot'][0] }}"
  delegate_facts: true

- name: "Ensure lpar_netboot_server_ip is set"
  ansible.builtin.set_fact:
    lpar_netboot_server_ip: "{{ hostvars[groups['netboot'][0]]['ansible_facts']['default_ipv4']['address'] }}"

- name: "Include installation variables for {{ hostvars[groups['netboot'][0]]['ansible_facts']['os_family'] }}"
  ansible.builtin.include_vars: "{{ hostvars[groups['netboot'][0]]['ansible_facts']['os_family'] }}.yml"

- name: Configure netboot server tasks
  delegate_to: "{{ groups['netboot'][0] }}"
  become: true
  block:
    - name: "Ensure netboot server is configured"
      ansible.builtin.include_tasks: configure_netboot_server.yml

- name: "Run logical partition installations sequentially"
  ansible.builtin.include_tasks: install_lpar.yml
  loop: "{{ lpar_instances }}"
