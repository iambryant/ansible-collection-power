---
- name: "Ensure facts are gathered for netboot server"
  ansible.builtin.setup:
  delegate_to: "{{ groups['netboot'][0] }}"
  delegate_facts: true

- name: "Ensure lpar_netboot_server_subnet is set"
  ansible.builtin.set_fact:
    lpar_netboot_server_subnet: "{{ hostvars[groups['netboot'][0]]['ansible_facts']['default_ipv4']['network'] }}"

- name: "Ensure lpar_netboot_server_netmask is set"
  ansible.builtin.set_fact:
    lpar_netboot_server_netmask: "{{ hostvars[groups['netboot'][0]]['ansible_facts']['default_ipv4']['netmask'] }}"

- name: "Ensure lpar_netboot_server_gateway is set"
  ansible.builtin.set_fact:
    lpar_netboot_server_gateway: "{{ hostvars[groups['netboot'][0]]['ansible_facts']['default_ipv4']['gateway'] }}"

- name: "Ensure lpar_netboot_server_ip is set"
  ansible.builtin.set_fact:
    lpar_netboot_server_ip: "{{ hostvars[groups['netboot'][0]]['ansible_facts']['default_ipv4']['address'] }}"

- name: "Ensure netboot server is configured"
  ansible.builtin.include_tasks: configure_netboot_server.yml

- name: "Run logical partition installations sequentially"
  ansible.builtin.include_tasks: install_lpar.yml
  loop: "{{ lpar_instances }}"
