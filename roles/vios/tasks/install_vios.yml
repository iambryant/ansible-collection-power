---
- name: "Check if VIOS logical partition already exists"
  connection: local
  ibm.power_hmc.vios:
    hmc_host: "{{ inventory_hostname }}"
    hmc_auth:
      username: "{{ ansible_user }}"
      password: "{{ ansible_password }}"
    system_name: "{{ item.system_name }}"
    name: "{{ item.name }}"
    state: "facts"
  register: vios_check

- name: "Run VIOS provisioning tasks"
  connection: local
  when: vios_check.vios_info is not defined
  block:
    - name: "Ensure VIOS logical partition is present"
      ibm.power_hmc.vios:
        hmc_host: "{{ inventory_hostname }}"
        hmc_auth:
          username: "{{ ansible_user }}"
          password: "{{ ansible_password }}"
        system_name: "{{ item.system_name }}"
        name: "{{ item.name }}"
        settings: "{{ item.settings }}"
        state: "present"

    - name: "Get MAC address of first network adapter found"
      ibm.power_hmc.hmc_command:
        hmc_host: '{{ inventory_hostname }}'
        hmc_auth:
          username: "{{ ansible_user }}"
          password: "{{ ansible_password }}"
        cmd: 'lpar_netboot -M -n -t ent "{{ item.name }}" "default_profile" "{{ item.system_name }}"'
      register: vios_hmc_command

    - name: "Ensure MAC address is set as fact"
      ansible.builtin.set_fact:
        network_macaddr: '{{ vios_hmc_command.command_output | regex_findall("ent\s+\S+\s+([0-9a-fA-F]{12})") | first }}'

    - name: "Install VIOS logical partition using the image available on the HMC"
      ibm.power_hmc.vios:
        hmc_host: "{{ inventory_hostname }}"
        hmc_auth:
          username: "{{ ansible_user }}"
          password: "{{ ansible_password }}"
        system_name: "{{ item.system_name }}"
        name: "{{ item.name }}"
        image_dir: "{{ item.image_dir }}"
        vios_iso: "{{ item.vios_iso }}"
        vios_IP: "{{ item.vios_ip }}"
        vios_gateway: "{{ item.vios_gateway }}"
        vios_subnetmask: "{{ item.vios_subnetmask }}"
        network_macaddr: "{{ network_macaddr }}"
        action: install

    - name: "Ensure VIOS license is accepted"
      ibm.power_hmc.vios:
        hmc_host: "{{ inventory_hostname }}"
        hmc_auth:
          username: "{{ ansible_user }}"
          password: "{{ ansible_password }}"
        system_name: "{{ item.system_name }}"
        name: "{{ item.name }}"
        action: accept_license

    - name: "Ensure VIOS firewall is enabled and allows required traffic"
      ibm.power_hmc.vios_secure:
        hmc_host: "{{ inventory_hostname }}"
        hmc_auth:
          username: "{{ ansible_user }}"
          password: "{{ ansible_password }}"
        system_name: "{{ item.system_name }}"
        vios_name: "{{ item.name }}"
        state: setting_firewall
        active: true
        reload: true
        ip_version: "ipv4"
